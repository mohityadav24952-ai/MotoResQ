<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoresQ - Provider Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .provider-panel { padding: 25px; }
        .top-bar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 12px; }
        .request-card { border: 1px solid #ddd; border-radius: 12px; padding: 16px; margin-bottom: 14px; background: #fff; border-left: 5px solid #ffc107; }
        .request-card.accepted { border-left-color: #28a745; opacity: 0.85; }
        .live-location { background: #e3f2fd; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <header><h1>🔧 MotoresQ Provider Dashboard</h1><p class="tagline">Accept or reject user service requests</p></header>
        <div class="provider-panel">
            <div class="live-location" id="liveLocation">📍 Getting your live location...</div>
            <div class="top-bar">
                <label>Provider type: <select id="providerType"><option value="fuel">⛽ Fuel Station</option><option value="mechanic">🔧 Mechanic</option></select></label>
                <label>Your Lat: <input id="providerLat" type="number" step="0.0001" value="30.3165" /></label>
                <label>Your Lng: <input id="providerLng" type="number" step="0.0001" value="78.0322" /></label>
                <button id="refreshBtn">🔄 Refresh</button>
                <span class="status-text" id="statusText">Waiting...</span>
            </div>
            <h2>📋 Incoming Requests</h2>
            <div id="requests"></div>
        </div>
    </div>
    <script src="provider.js"></script>
</body>
</html>
